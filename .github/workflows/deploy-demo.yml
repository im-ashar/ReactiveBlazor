name: Deploy Demo to MonsterASP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy Demo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build Tailwind CSS
        run: |
          npm install tailwindcss @tailwindcss/cli
          npx @tailwindcss/cli -i ReactiveBlazor.Demo/wwwroot/app.css -o ReactiveBlazor.Demo/wwwroot/app.output.css --minify

      - name: Publish Demo Application
        run: dotnet publish ReactiveBlazor.Demo/ReactiveBlazor.Demo.csproj -c Release -o ./publish

      - name: Take Application Offline
        env:
          SFTP_PASSWORD: ${{ secrets.MONSTERASP_FTP_PASSWORD }}
          SFTP_USER: ${{ secrets.MONSTERASP_FTP_USERNAME }}
          SFTP_HOST: ${{ secrets.MONSTERASP_FTP_SERVER }}
          SFTP_DIR: ${{ secrets.MONSTERASP_FTP_SERVER_DIR || '/wwwroot' }}
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          echo "<html><body><h2>Site offline for deployment. Please try again in a few moments.</h2></body></html>" > ./app_offline.htm
          lftp -c "set sftp:auto-confirm yes; \
                   open -u $SFTP_USER,$SFTP_PASSWORD sftp://$SFTP_HOST:22; \
                   put -O $SFTP_DIR ./app_offline.htm"
          sleep 5

      - name: Deploy via SFTP
        env:
          SFTP_PASSWORD: ${{ secrets.MONSTERASP_FTP_PASSWORD }}
          SFTP_USER: ${{ secrets.MONSTERASP_FTP_USERNAME }}
          SFTP_HOST: ${{ secrets.MONSTERASP_FTP_SERVER }}
          SFTP_DIR: ${{ secrets.MONSTERASP_FTP_SERVER_DIR || '/wwwroot' }}
        run: |
          cd ./publish
          lftp -c "set sftp:auto-confirm yes; \
                   set mirror:set-permissions no; \
                   open -u $SFTP_USER,$SFTP_PASSWORD sftp://$SFTP_HOST:22; \
                   mirror -R --transfer-all --verbose . $SFTP_DIR"

      - name: Bring Application Online
        if: always()
        env:
          SFTP_PASSWORD: ${{ secrets.MONSTERASP_FTP_PASSWORD }}
          SFTP_USER: ${{ secrets.MONSTERASP_FTP_USERNAME }}
          SFTP_HOST: ${{ secrets.MONSTERASP_FTP_SERVER }}
          SFTP_DIR: ${{ secrets.MONSTERASP_FTP_SERVER_DIR || '/wwwroot' }}
        run: |
          if ! command -v lftp &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y lftp
          fi
          lftp -c "set sftp:auto-confirm yes; \
                   open -u $SFTP_USER,$SFTP_PASSWORD sftp://$SFTP_HOST:22; \
                   rm -f $SFTP_DIR/app_offline.htm"


